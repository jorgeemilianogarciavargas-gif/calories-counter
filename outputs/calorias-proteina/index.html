<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#173f3a" />
    <title>Calorias y Proteina</title>
    <link rel="manifest" href="./manifest.json" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Diario nutricional</p>
          <h1>Calorias y Proteina</h1>
        </div>
        <button class="icon-button" id="resetDay" type="button" aria-label="Limpiar dia" title="Limpiar dia">
          <span aria-hidden="true">↺</span>
        </button>
      </header>

      <section class="summary-grid" aria-label="Resumen del dia">
        <article class="metric-card calories">
          <div class="ring" id="calorieRing" aria-hidden="true">
            <span id="caloriePercent">0%</span>
          </div>
          <div>
            <p>Calorias</p>
            <strong><span id="caloriesTotal">0</span> / <span id="caloriesGoalText">2200</span></strong>
            <small>kcal de hoy</small>
          </div>
        </article>
        <article class="metric-card protein">
          <div class="ring" id="proteinRing" aria-hidden="true">
            <span id="proteinPercent">0%</span>
          </div>
          <div>
            <p>Proteina</p>
            <strong><span id="proteinTotal">0</span> / <span id="proteinGoalText">160</span>g</strong>
            <small>gramos de hoy</small>
          </div>
        </article>
      </section>

      <section class="panel goals-panel" aria-labelledby="goalsTitle">
        <div class="section-title">
          <h2 id="goalsTitle">Metas</h2>
          <button class="ghost-button" id="saveGoals" type="button">Guardar</button>
        </div>
        <div class="goal-inputs">
          <label>
            <span>Calorias</span>
            <input id="caloriesGoal" type="number" inputmode="numeric" min="1" step="50" value="2200" />
          </label>
          <label>
            <span>Proteina</span>
            <input id="proteinGoal" type="number" inputmode="decimal" min="1" step="5" value="160" />
          </label>
        </div>
      </section>

      <section class="panel" aria-labelledby="entryTitle">
        <div class="section-title">
          <h2 id="entryTitle">Agregar alimento</h2>
        </div>
        <form id="foodForm" autocomplete="off">
          <label class="full">
            <span>Nombre</span>
            <input id="foodName" required maxlength="40" placeholder="Ej. Pechuga de pollo" />
          </label>

          <div class="meal-tabs" role="radiogroup" aria-label="Comida">
            <label><input type="radio" name="meal" value="Desayuno" checked /><span>Desayuno</span></label>
            <label><input type="radio" name="meal" value="Comida" /><span>Comida</span></label>
            <label><input type="radio" name="meal" value="Cena" /><span>Cena</span></label>
            <label><input type="radio" name="meal" value="Snack" /><span>Snack</span></label>
          </div>

          <div class="form-grid">
            <label>
              <span>Porciones</span>
              <input id="servings" type="number" inputmode="decimal" min="0.1" step="0.1" value="1" required />
            </label>
            <label>
              <span>kcal/porcion</span>
              <input id="calories" type="number" inputmode="numeric" min="0" step="1" required />
            </label>
            <label>
              <span>Proteina/porcion</span>
              <input id="protein" type="number" inputmode="decimal" min="0" step="0.1" required />
            </label>
          </div>

          <button class="primary-button" type="submit">Agregar</button>
        </form>
      </section>

      <section class="panel entries-panel" aria-labelledby="logTitle">
        <div class="section-title">
          <h2 id="logTitle">Registro</h2>
          <span id="entryCount">0 items</span>
        </div>
        <div id="emptyState" class="empty-state">
          <div class="plate-art" aria-hidden="true">
            <span></span>
          </div>
          <p>Agrega tu primer alimento para ver tus totales del dia.</p>
        </div>
        <div id="entriesList" class="entries-list"></div>
      </section>
    </main>

    <template id="entryTemplate">
      <article class="entry-card">
        <div>
          <p class="entry-meal"></p>
          <h3 class="entry-name"></h3>
          <span class="entry-servings"></span>
        </div>
        <div class="entry-values">
          <strong class="entry-calories"></strong>
          <span class="entry-protein"></span>
          <button class="delete-button" type="button" aria-label="Eliminar alimento" title="Eliminar">×</button>
        </div>
      </article>
    </template>

    <script src="./app.js"></script>
  </body>
</html>
